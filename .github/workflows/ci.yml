name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref when a new push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # ─────────────────────────────────────────────────────────────
  # Web — Astro typecheck + production build
  # ─────────────────────────────────────────────────────────────
  web:
    name: web · check + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci --prefix web

      - name: Typecheck (astro check)
        run: npm run check --prefix web

      - name: Build (Vercel adapter)
        run: npm run build --prefix web

  # ─────────────────────────────────────────────────────────────
  # Crawler — Vitest 100% coverage on pure functions
  # ─────────────────────────────────────────────────────────────
  crawler:
    name: crawler · test (100% coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: crawler/package-lock.json

      - name: Install
        run: npm ci --prefix crawler

      - name: Vitest + coverage
        run: npm run test:coverage --prefix crawler

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawler-coverage
          path: crawler/coverage/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────
  # E2E — Playwright across chromium + Pixel 5 mobile
  # Uses the mock-api fallback (no Supabase env vars needed).
  # ─────────────────────────────────────────────────────────────
  e2e:
    name: e2e · playwright
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci --prefix web

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Install Playwright system deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: web

      - name: Run E2E tests
        run: npm run test:e2e --prefix web
        env:
          CI: '1'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────
  # Lighthouse CI — performance/a11y/SEO budgets on the built site
  # Runs `astro preview` and audits the 3 key public pages.
  # ─────────────────────────────────────────────────────────────
  lighthouse:
    name: lighthouse · perf + a11y
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Lighthouse is informational on PRs; gating requires we tune scores first.
    continue-on-error: true
    needs: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci --prefix web

      - name: Build (node adapter for preview)
        run: ADAPTER=node npm run build --prefix web

      - name: Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.14.x
          lhci autorun --config=./.lighthouserc.json
        working-directory: web

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: web/.lighthouseci/
          retention-days: 14
