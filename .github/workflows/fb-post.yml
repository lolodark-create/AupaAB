name: Post daily digest to Facebook

# 08:05 UTC = 09:05 CET / 10:05 CEST. Fires 5 min after the newsletter
# so the page audience sees value but readers wanting it first → signup.

on:
  schedule:
    - cron: '5 7 * * *'
  workflow_dispatch: {}

concurrency:
  group: fb-post-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: crawler/package-lock.json
      - run: npm ci --prefix crawler
      - name: Post FB digest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL || 'https://aupa-ab.vercel.app' }}
        run: node crawler/scripts/post-fb.mjs
