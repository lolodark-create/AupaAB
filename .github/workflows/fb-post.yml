name: Post daily digest to Facebook

# Manual-only until the post format is fully validated. The auto-schedule
# below is intentionally commented out — re-enable when the template is
# locked in and you're OK with daily fire-and-forget. Trigger manually
# via the Actions tab (workflow_dispatch).
on:
  # schedule:
  #   - cron: '5 7 * * *'
  workflow_dispatch: {}

concurrency:
  group: fb-post-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: crawler/package-lock.json
      - run: npm ci --prefix crawler
      - name: Post FB digest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL || 'https://aupa-ab.vercel.app' }}
        run: node crawler/scripts/post-fb.mjs
