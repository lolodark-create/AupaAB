<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B2545"/>
      <stop offset="100%" stop-color="#061528"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Big logo accent right side -->
  <g transform="translate(870 165)">
    <rect width="300" height="300" rx="40" fill="#B3DCFA" opacity="0.18"/>
  </g>

  <!-- Top: brand mark -->
  <g transform="translate(80 80)">
    <rect x="0" y="0" width="80" height="80" rx="14" fill="#B3DCFA"/>
    <text x="40" y="35" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Arial Black', sans-serif"
          font-weight="900" font-size="25" fill="white" letter-spacing="-1.5">AUPA</text>
    <text x="40" y="68" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Arial Black', sans-serif"
          font-weight="900" font-size="25" fill="white" letter-spacing="-1.5">AB</text>

    <text x="104" y="42"
          font-family="'New York', 'Iowan Old Style', Charter, Georgia, serif"
          font-weight="600" font-size="32" fill="#FAFAF7" letter-spacing="-0.5">
      AUPA <tspan fill="#B3DCFA">AB</tspan>
    </text>
    <text x="104" y="68"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-weight="500" font-size="13" fill="#9CA3AF" letter-spacing="2.5">
      TRIBUNE DES SUPPORTERS
    </text>
  </g>

  <!-- Title block -->
  <g transform="translate(80 260)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-weight="600" font-size="14" fill="#B3DCFA" letter-spacing="3">
      AGRÉGATEUR · NON-OFFICIEL
    </text>
    <text y="60"
          font-family="'New York', 'Iowan Old Style', Charter, Georgia, serif"
          font-weight="600" font-size="72" fill="#FAFAF7" letter-spacing="-1">
      L'Aviron Bayonnais,
    </text>
    <text y="146"
          font-family="'New York', 'Iowan Old Style', Charter, Georgia, serif"
          font-weight="600" font-size="72" fill="#FAFAF7" letter-spacing="-1">
      <tspan fill="#B3DCFA">sans en perdre une miette.</tspan>
    </text>
    <text y="210"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-weight="400" font-size="22" fill="#9CA3AF">
      Toute l'actu agrégée depuis 6 médias, sans pub intrusive.
    </text>
  </g>

  <!-- Footer accent -->
  <g transform="translate(80 565)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-weight="600" font-size="13" fill="rgba(250,250,247,0.55)" letter-spacing="2.5">
      AUPA-AB.COM · CONSTRUIT À BAYONNE · LU PARTOUT
    </text>
  </g>
</svg>
