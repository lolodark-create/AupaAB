<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AUPA AB — Hi-fi prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Inter:wght@400..700&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; height: 100%; font-family: 'Inter', sans-serif; background: #1A1D24; color: #FAFAF7; }
  #root { height: 100%; }
  .iframe-wrap { width: 100%; height: 100%; border: none; display: block; background: #FAFAF7; }

  /* Custom canvas backdrop with subtle Aviron color */
  body { background: #0E1116; }

  .dc-intro {
    padding: 20px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    background: #0B2545;
    color: #FAFAF7;
    display: flex; align-items: center; gap: 24px;
  }
  .dc-intro img { width: 56px; height: 56px; border-radius: 10px; }
  .dc-intro h1 { margin: 0; font-family: 'Fraunces', serif; font-weight: 600; font-size: 22px; letter-spacing: -0.01em; }
  .dc-intro p { margin: 4px 0 0; font-size: 13px; color: rgba(250,250,247,0.7); max-width: 720px; }
  .dc-intro .badge {
    margin-left: auto; padding: 6px 10px; font-size: 10.5px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    background: rgba(0,153,216,0.2); color: #3FB0E5;
    border-radius: 4px;
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
  const PROTO = 'prototype/index.html';

  function ProtoFrame({ device }) {
    const ref = React.useRef(null);
    return (
      <iframe
        ref={ref}
        src={PROTO + '?device=' + device}
        title={'AUPA AB — ' + device}
        className="iframe-wrap"
        style={{ border: 'none' }}
      />
    );
  }

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="proto" title="AUPA AB — prototype interactif" subtitle="Cliquez sur les articles · Naviguez via le menu · Toggle Lune/Soleil pour le dark mode · ⌘K pour la recherche">
          <DCArtboard id="mobile" label="Mobile · 375 × 812" width={375} height={812}>
            <ProtoFrame device="mobile"/>
          </DCArtboard>
          <DCArtboard id="desktop" label="Desktop · 1280 × 900" width={1280} height={900}>
            <ProtoFrame device="desktop"/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
